<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>OnboardPro</title>
	<link rel="icon" href="/assets/onboardpro/logo.png" />
	<link rel="manifest" href="/assets/onboardpro/frontend/manifest.webmanifest" />
	<meta name="theme-color" content="#3d4cb7" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="default" />
	<meta name="apple-mobile-web-app-title" content="OnboardPro" />
	<link rel="apple-touch-icon" href="/assets/onboardpro/frontend/icon-192.png" />
	{% for css in css_files %}
	<link rel="stylesheet" href="{{ css }}" />
	{% endfor %}
</head>
<body style="margin:0">
	<div id="app"></div>
	<div id="modals"></div>
	<div id="popovers"></div>
	<script>
		window.csrf_token = "{{ csrf_token }}";
		window.frappe = {
			csrf_token: "{{ csrf_token }}",
			session: {
				user: "{{ session_user }}",
				user_fullname: "{{ session_user_fullname }}"
			}
		};
	</script>
	{% if js_file %}
	<script type="module" src="{{ js_file }}"></script>
	{% endif %}
</body>
</html>
