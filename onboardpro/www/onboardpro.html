{% extends "templates/web.html" %}

{% block title %}Risto — Implementation Portal{% endblock %}

{% block head_include %}
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
{% for css in css_files %}
<link rel="stylesheet" href="{{ css }}" />
{% endfor %}
{% endblock %}

{% block content %}
<div id="app"></div>
<div id="modals"></div>
<div id="popovers"></div>
{% endblock %}

{% block script %}
{% if js_file %}
<script type="module" src="{{ js_file }}"></script>
{% endif %}
{% endblock %}
